<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<title>Sites · Jurie</title>
<style>
  :root {
    --bg: #0f1419;
    --panel: #161a20;
    --panel-2: #1c2128;
    --border: #242a33;
    --fg: #e8eaed;
    --muted: #9aa0a6;
    --accent: #6ee7b7;
    --warn: #fbbf24;
    --error: #ef4444;
    --success: #22c55e;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #faf8f5;
      --panel: #ffffff;
      --panel-2: #f5f3ee;
      --border: #e5e1d8;
      --fg: #1a1a1a;
      --muted: #6b7280;
      --accent: #047857;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 920px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  h2 { margin: 0 0 12px; font-size: 14px; font-weight: 600; color: var(--muted); }
  .meta { color: var(--muted); font-size: 13px; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  button, .btn {
    font: inherit;
    padding: 7px 14px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--fg);
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  button:hover, .btn:hover { border-color: var(--muted); background: var(--panel-2); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  input[type=password], input[type=text], input[type=email] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--fg);
    border-radius: 6px;
    font: inherit;
  }
  input:focus { outline: none; border-color: var(--accent); }

  header.top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 24px;
  }
  header.top .title-block .meta { margin-top: 4px; }
  header.top .actions { display: flex; gap: 8px; align-items: center; }
  header.top .who { font-size: 12px; color: var(--muted); margin-right: 4px; }

  .site {
    display: grid;
    grid-template-columns: 12px 1fr auto;
    gap: 16px;
    align-items: center;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--panel);
    margin-bottom: 8px;
  }
  .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--muted);
  }
  .dot.ready { background: var(--success); }
  .dot.error { background: var(--error); }
  .dot.building { background: var(--warn); animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.35 } }
  .site .body { min-width: 0; }
  .site .name {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .site .url { font-size: 12.5px; }
  .site .when { color: var(--muted); font-size: 12px; margin-top: 3px; }
  .site .when .state { text-transform: capitalize; }
  .drop {
    border: 1px dashed var(--border);
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--muted);
    font-size: 12.5px;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    white-space: nowrap;
    user-select: none;
  }
  .drop:hover { border-color: var(--muted); color: var(--fg); }
  .drop.over { border-color: var(--accent); color: var(--accent); background: rgba(110,231,183,0.08); }
  .drop.uploading { border-color: var(--warn); color: var(--warn); }
  .drop.success { border-color: var(--success); color: var(--success); }
  .drop.failed { border-color: var(--error); color: var(--error); }
  .drop input[type=file] { display: none; }

  /* Login / PAT-prompt cards */
  .card { max-width: 420px; margin: 80px auto; padding: 28px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; }
  .card h1 { margin-bottom: 6px; }
  .card p { margin: 0 0 18px; color: var(--muted); font-size: 13px; }
  .card p code { background: var(--panel-2); padding: 1px 5px; border-radius: 3px; font-size: 12px; }
  .card .row { margin-bottom: 10px; }
  .card .primary { width: 100%; padding: 11px; background: var(--accent); color: var(--bg); border: none; font-weight: 600; }
  .card .primary:hover { background: var(--accent); filter: brightness(1.05); }
  .card .secondary { width: 100%; padding: 11px; }
  .card .or { text-align: center; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin: 10px 0 8px; }
  .card .err { color: var(--error); font-size: 13px; margin-top: 12px; min-height: 18px; }
  .card .info { color: var(--success); font-size: 13px; margin-top: 12px; }
  .card .signout { display: block; text-align: center; margin-top: 16px; font-size: 12px; color: var(--muted); cursor: pointer; }
  .card .signout:hover { color: var(--fg); }

  .empty { padding: 48px 16px; text-align: center; color: var(--muted); }
  .err-banner { padding: 12px 16px; border: 1px solid var(--error); background: rgba(239,68,68,0.08); color: var(--error); border-radius: 8px; margin-bottom: 16px; font-size: 13px; }

  @media (max-width: 600px) {
    .site { grid-template-columns: 9px 1fr; padding: 12px; }
    .site .drop { grid-column: 2; justify-self: stretch; text-align: center; margin-top: 4px; }
    header.top { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="wrap" id="root">Loading…</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

// ── Config ─────────────────────────────────────────────────────────────────
// Supabase project shared with ib-inbox / ali. The publishable key is safe in
// the browser by design (it's gated by Row Level Security and Auth).
const SUPABASE_URL = 'https://asujxmeolnokjyaephaw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_ZOKIQQ9KKY3rftUqBZFo0w_Ha2UBeIT';
const NETLIFY = 'https://api.netlify.com/api/v1';
const ALI_LAUNCHER = 'https://ali.juriekriel.info/';

// SSO works only on real *.juriekriel.info subdomains (cookies can't span
// netlify.app ↔ juriekriel.info). On the netlify.app preview URL we fall
// back to a local sign-in screen using default localStorage.
const ON_JK_DOMAIN = /\.juriekriel\.info$/i.test(location.hostname);

// Cookie storage scoped to .juriekriel.info so ali, web, ib, sn etc. share
// the same Supabase session. Sign in once at ali, signed in everywhere.
const cookieStorage = {
  getItem(key) {
    const re = new RegExp('(?:^|; )' + key.replace(/[.$?*|{}()[\]\\\/+^]/g, '\\$&') + '=([^;]*)');
    const m = document.cookie.match(re);
    return m ? decodeURIComponent(m[1]) : null;
  },
  setItem(key, value) {
    const enc = encodeURIComponent(value);
    document.cookie = `${key}=${enc}; domain=.juriekriel.info; path=/; max-age=31536000; secure; samesite=lax`;
  },
  removeItem(key) {
    document.cookie = `${key}=; domain=.juriekriel.info; path=/; max-age=0; secure; samesite=lax`;
  },
};

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: ON_JK_DOMAIN
    ? { storage: cookieStorage, storageKey: 'sb-juriekriel-auth',
        detectSessionInUrl: true, persistSession: true, autoRefreshToken: true, flowType: 'pkce' }
    : { detectSessionInUrl: true, persistSession: true, autoRefreshToken: true }
});
const root = document.getElementById('root');
let pat = '';      // fetched from Supabase app_config after auth, never persisted
let user = null;

// ── Netlify API helpers ────────────────────────────────────────────────────
async function fetchPatFromSupabase() {
  const { data, error } = await supabase
    .from('app_config')
    .select('value')
    .eq('key', 'netlify_pat')
    .single();
  if (error) throw new Error(`Supabase fetch failed: ${error.message}`);
  if (!data?.value || data.value === 'PLACEHOLDER_REPLACE_ME') {
    throw new Error('Netlify PAT not configured. Ask Jurie to set it in Supabase app_config.');
  }
  return data.value;
}

async function nf(path, opts = {}) {
  const headers = new Headers(opts.headers || {});
  headers.set('Authorization', `Bearer ${pat}`);
  if (opts.body && !headers.has('Content-Type') && !(opts.body instanceof FormData)) {
    headers.set('Content-Type', 'application/json');
  }
  const r = await fetch(NETLIFY + path, { ...opts, headers });
  if (r.status === 401) {
    throw new Error('PAT rejected by Netlify (401). The token in Supabase may be stale or revoked.');
  }
  return r;
}

async function listSites() {
  const r = await nf('/sites?sort_by=updated_at&filter=all');
  if (!r.ok) throw new Error('list-sites failed: ' + r.status);
  return r.json();
}

// File-digest deploy method — works for any single-file upload, no size cap.
// For zips, falls back to direct binary POST.
async function deployFile(siteId, file) {
  const buf = await file.arrayBuffer();
  const isZip = file.name.toLowerCase().endsWith('.zip') || file.type === 'application/zip';

  if (isZip) {
    const r = await nf(`/sites/${siteId}/deploys`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/zip' },
      body: buf,
    });
    if (!r.ok) throw new Error(`deploy ${r.status}: ${await r.text()}`);
    return r.json();
  }

  const sha1 = await sha1hex(buf);
  const create = await nf(`/sites/${siteId}/deploys`, {
    method: 'POST',
    body: JSON.stringify({ files: { '/index.html': sha1 } }),
  });
  if (!create.ok) throw new Error(`deploy create ${create.status}: ${await create.text()}`);
  const deploy = await create.json();
  if ((deploy.required || []).includes(sha1)) {
    const up = await nf(`/deploys/${deploy.id}/files/index.html`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/octet-stream' },
      body: buf,
    });
    if (!up.ok) throw new Error(`upload ${up.status}: ${await up.text()}`);
  }
  return deploy;
}

async function sha1hex(buf) {
  const hash = await crypto.subtle.digest('SHA-1', buf);
  return [...new Uint8Array(hash)].map(b => b.toString(16).padStart(2, '0')).join('');
}

// ── Time formatting ────────────────────────────────────────────────────────
function timeAgo(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const s = Math.floor((Date.now() - d) / 1000);
  if (s < 5) return 'just now';
  if (s < 60) return s + 's ago';
  const m = Math.floor(s / 60);
  if (m < 60) return m + ' min ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + ' h ago';
  const dys = Math.floor(h / 24);
  if (dys < 30) return dys + ' d ago';
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
}

// ── Views ──────────────────────────────────────────────────────────────────
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function authView(initialErr = '') {
  root.innerHTML = `
    <div class="card">
      <h1>Sign in</h1>
      <p>Use your team email. We'll send a one-tap magic link.</p>
      <div class="row">
        <input id="email" type="email" placeholder="you@…" autocomplete="email" autofocus>
      </div>
      <button class="primary" id="magic">Email me a magic link</button>
      <div class="or">or</div>
      <button class="secondary" id="google">Continue with Google</button>
      <div class="err" id="err">${escapeHtml(initialErr)}</div>
    </div>`;
  const emailEl = document.getElementById('email');
  const errEl = document.getElementById('err');
  const setErr = (m, kind = 'err') => { errEl.textContent = m; errEl.className = kind; };

  const sendMagic = async () => {
    const email = emailEl.value.trim();
    if (!email) { setErr('Enter your email first.'); return; }
    setErr('Sending…');
    const { error } = await supabase.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: `${location.origin}/` }
    });
    if (error) { setErr(error.message); return; }
    setErr(`Magic link sent to ${email}. Check your inbox.`, 'info');
  };

  const google = async () => {
    setErr('Redirecting…');
    const { error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: `${location.origin}/` }
    });
    if (error) setErr(error.message);
  };

  document.getElementById('magic').onclick = sendMagic;
  document.getElementById('google').onclick = google;
  emailEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendMagic(); });
}

function configErrorView(message) {
  root.innerHTML = `
    <div class="card">
      <h1>Setup needed</h1>
      <p>${escapeHtml(message)}</p>
      <a class="signout" id="signout">Sign out</a>
    </div>`;
  document.getElementById('signout').onclick = signOut;
}

function siteRow(s) {
  const dep = s.published_deploy;
  const state = dep?.state || 'unknown';
  const dotClass = state === 'ready' ? 'ready'
                 : state === 'error' ? 'error'
                 : ['building','uploading','processing','enqueued','prepared'].includes(state) ? 'building'
                 : '';
  const url = s.custom_domain ? `https://${s.custom_domain}` : (s.ssl_url || s.url);
  const displayUrl = url.replace(/^https?:\/\//, '');
  return `
    <div class="site" data-id="${s.id}" data-name="${escapeHtml(s.name)}">
      <div class="dot ${dotClass}" title="${state}"></div>
      <div class="body">
        <div class="name">${escapeHtml(s.name)}</div>
        <a class="url" href="${url}" target="_blank" rel="noopener">${escapeHtml(displayUrl)}</a>
        <div class="when"><span class="state">${state}</span> · ${timeAgo(dep?.created_at)}${dep?.deploy_time ? ` · built in ${dep.deploy_time}s` : ''}</div>
      </div>
      <label class="drop" data-id="${s.id}">
        <span class="drop-label">Deploy file</span>
        <input type="file" accept=".html,.zip">
      </label>
    </div>`;
}

function dashView(sites) {
  const userLabel = user?.email ? escapeHtml(user.email) : '';
  if (!sites || sites.length === 0) {
    root.innerHTML = `
      <header class="top">
        <div class="title-block">
          <h1>Sites</h1>
          <div class="meta">No sites yet.</div>
        </div>
        <div class="actions">
          <span class="who">${userLabel}</span>
          <button id="signout">Sign out</button>
        </div>
      </header>
      <div class="empty">Create a site at <a href="https://app.netlify.com" target="_blank" rel="noopener">app.netlify.com</a> and refresh.</div>`;
    document.getElementById('signout').onclick = signOut;
    return;
  }
  root.innerHTML = `
    <header class="top">
      <div class="title-block">
        <h1>Sites <span class="meta">(${sites.length})</span></h1>
        <div class="meta">Drop an <code>.html</code> or <code>.zip</code> on a site to deploy. Status auto-refreshes every 30s.</div>
      </div>
      <div class="actions">
        <span class="who">${userLabel}</span>
        <button id="refresh">Refresh</button>
        <button id="signout" title="Sign out and clear PAT">Sign out</button>
      </div>
    </header>
    <div id="list">${sites.map(siteRow).join('')}</div>`;
  document.getElementById('refresh').onclick = () => main();
  document.getElementById('signout').onclick = signOut;
  wireDropZones();
}

async function signOut() {
  pat = '';
  await supabase.auth.signOut();
  user = null;
  // On juriekriel.info subdomains, signing out clears the shared cookie —
  // bounce to ali so the user lands on a clean sign-in surface.
  if (ON_JK_DOMAIN) {
    location.replace(ALI_LAUNCHER);
    return;
  }
  authView();
}

// ── Drop zones / deploy flow ────────────────────────────────────────────────
function wireDropZones() {
  document.querySelectorAll('.drop').forEach(el => {
    const siteId = el.dataset.id;
    const input = el.querySelector('input[type=file]');
    const labelEl = el.querySelector('.drop-label');
    const originalLabel = labelEl.textContent;

    const setLabel = (t) => { labelEl.textContent = t; };
    const setStatus = (cls) => {
      el.classList.remove('over', 'uploading', 'success', 'failed');
      if (cls) el.classList.add(cls);
    };
    const reset = () => { setStatus(''); setLabel(originalLabel); };

    const upload = async (file) => {
      setStatus('uploading');
      setLabel(`Uploading ${prettyBytes(file.size)}…`);
      try {
        await deployFile(siteId, file);
        setStatus('success');
        setLabel('Deployed ✓');
        setTimeout(() => { reset(); main(); }, 1800);
      } catch (e) {
        setStatus('failed');
        setLabel(`Failed: ${e.message}`.slice(0, 60));
        setTimeout(reset, 5000);
      }
    };

    input.addEventListener('change', () => {
      if (input.files[0]) upload(input.files[0]);
      input.value = '';
    });
    ['dragenter', 'dragover'].forEach(ev =>
      el.addEventListener(ev, (e) => { e.preventDefault(); if (!el.classList.contains('uploading')) el.classList.add('over'); }));
    ['dragleave', 'dragend'].forEach(ev =>
      el.addEventListener(ev, () => el.classList.remove('over')));
    el.addEventListener('drop', (e) => {
      e.preventDefault();
      el.classList.remove('over');
      const f = e.dataTransfer?.files?.[0];
      if (f) upload(f);
    });
  });
}

function prettyBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
  return (n / 1024 / 1024).toFixed(1) + ' MB';
}

// ── Main ────────────────────────────────────────────────────────────────────
let refreshTimer = null;

async function main() {
  // Layer 1: Supabase identity. On juriekriel.info subdomains we use the
  // shared session cookie set by the ali launcher; on the netlify.app
  // preview URL we fall back to the inline sign-in screen.
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) {
    if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
    user = null;
    pat = '';
    if (ON_JK_DOMAIN) {
      // Hand off to the ali launcher; it sends the user back here after sign-in.
      const ret = encodeURIComponent(location.href);
      location.replace(`${ALI_LAUNCHER}?return=${ret}`);
      return;
    }
    return authView();
  }
  user = session.user;

  // Layer 2: Fetch the shared Netlify PAT from Supabase (RLS means only
  // authenticated users can read it). Once fetched, kept in module memory
  // for the session — never persisted to localStorage.
  if (!pat) {
    try {
      pat = await fetchPatFromSupabase();
    } catch (e) {
      if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
      return configErrorView(e.message);
    }
  }

  try {
    const sites = await listSites();
    dashView(sites);
    if (refreshTimer) clearInterval(refreshTimer);
    refreshTimer = setInterval(silentRefresh, 30_000);
  } catch (e) {
    root.innerHTML = `<div class="err-banner">${escapeHtml(e.message)}</div>`;
  }
}

async function silentRefresh() {
  if (!pat) return;
  if (document.querySelector('.drop.uploading')) return;
  try {
    const sites = await listSites();
    dashView(sites);
  } catch (e) {
    console.warn('refresh failed:', e.message);
  }
}

// React to Supabase session changes (sign-in, sign-out, magic-link return).
supabase.auth.onAuthStateChange((event) => {
  if (event === 'SIGNED_IN' || event === 'SIGNED_OUT' || event === 'TOKEN_REFRESHED') {
    main();
  }
});

main();
</script>
</body>
</html>
